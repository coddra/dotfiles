<touchégg>
  <settings>
    <property name="animation_delay">150</property>
    <property name="action_execute_threshold">20</property>
    <property name="color">auto</property>
    <property name="borderColor">auto</property>
  </settings>
  <application name="All">
    <gesture type="TAP" fingers="2" direction="UNKNOWN">
      <action type="MOUSE_CLICK">
        <button>3</button>
        <on>begin</on>
      </action>
    </gesture>
    <gesture type="TAP" fingers="3" direction="UNKNOWN">
      <action type="MOUSE_CLICK">
        <button>2</button>
        <on>begin</on>
      </action>
    </gesture>
    <gesture type="PINCH" fingers="3" direction="OUT">
      <action type="RUN_COMMAND">
        <command>onboard</command>
        <repeat>false</repeat>
        <animation>NONE</animation>
        <on>end</on>
      </action>
    </gesture>
    <gesture type="PINCH" fingers="4" direction="OUT">
      <action type="SEND_KEYS">
        <modifiers>Super_L</modifiers>
        <keys>Shift_L+d</keys>
        <repeat>false</repeat>
        <animation>NONE</animation>
        <on>end</on>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="4" direction="LEFT">
      <action type="RUN_COMMAND">
        <command>i3-msg move container to workspace next; i3-msg workspace next</command>
        <repeat>false</repeat>
        <animation>NONE</animation>
        <on>end</on>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="4" direction="RIGHT">
      <action type="RUN_COMMAND">
        <command>i3-msg move container to workspace prev; i3-msg workspace prev</command>
        <repeat>false</repeat>
        <animation>NONE</animation>
        <on>end</on>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="3" direction="DOWN">
      <action type="RUN_COMMAND">
        <command>i3-msg fullscreen</command>
        <repeat>false</repeat>
        <animation>MINIMIZE_WINDOW</animation>
        <on>end</on>
      </action>
    </gesture>
    <gesture type="PINCH" fingers="4" direction="IN">
      <action type="CLOSE_WINDOW"></action>
    </gesture>
    <gesture type="TAP" fingers="4" direction="UNKNOWN">
      <action type="RUN_COMMAND">
        <command>write &amp;</command>
        <repeat>false</repeat>
        <animation>MINIMIZE_WINDOW</animation>
        <on>begin</on>
      </action>
    </gesture>
    <gesture type="TAP" fingers="5" direction="UNKNOWN">
      <action type="RUN_COMMAND">
        <command>chromium &amp;</command>
        <repeat>false</repeat>
        <animation>MAXIMIZE_WINDOW</animation>
        <on>begin</on>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="3" direction="LEFT">
      <action type="RUN_COMMAND">
        <command>i3-msg workspace next; ~/.config/polybar/wsindicator-update.sh</command>
        <repeat>false</repeat>
        <animation>CHANGE_DESKTOP_RIGHT</animation>
        <on>end</on>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="3" direction="RIGHT">
      <action type="RUN_COMMAND">
        <command>i3-msg workspace prev; ~/.config/polybar/wsindicator-update.sh</command>
        <repeat>false</repeat>
        <animation>CHANGE_DESKTOP_LEFT</animation>
        <on>end</on>
      </action>
    </gesture>
  </application>
  <application name="qpdfview">
    <gesture type="SWIPE" fingers="2" direction="UP">
      <action type="SEND_KEYS">
        <modifiers></modifiers>
        <keys>Down</keys>
        <repeat>true</repeat>
        <animation>NONE</animation>
        <decreaseKeys>Up</decreaseKeys>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="2" direction="DOWN">
      <action type="SEND_KEYS">
        <modifiers></modifiers>
        <keys>Up</keys>
        <repeat>true</repeat>
        <animation>NONE</animation>
        <decreaseKeys>Down</decreaseKeys>
      </action>
    </gesture>
  </application>
  <application name="qutebrowser">
    <gesture type="SWIPE" fingers="2" direction="LEFT">
      <action type="SEND_KEYS">
        <modifiers>Shift_L</modifiers>
        <keys>l</keys>
        <repeat>false</repeat>
        <animation>NONE</animation>
        <on>end</on>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="2" direction="RIGHT">
      <action type="SEND_KEYS">
        <modifiers>Shift_L</modifiers>
        <keys>h</keys>
        <repeat>false</repeat>
        <animation>NONE</animation>
        <on>end</on>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="4" direction="DOWN">
      <action type="SEND_KEYS">
        <modifiers>Control_L</modifiers>
        <keys>w</keys>
        <repeat>false</repeat>
        <animation>NONE</animation>
        <on>end</on>
      </action>
    </gesture>
    <gesture type="TAP" fingers="4" direction="UNKNOWN">
      <action type="SEND_KEYS">
        <modifiers></modifiers>
        <keys>o</keys>
        <repeat>false</repeat>
        <animation>NONE</animation>
        <on>begin</on>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="4" direction="UP">
      <action type="SEND_KEYS">
        <modifiers></modifiers>
        <keys>u</keys>
        <repeat>false</repeat>
        <animation>NONE</animation>
        <on>end</on>
      </action>
    </gesture>
  </application>
</touchégg>