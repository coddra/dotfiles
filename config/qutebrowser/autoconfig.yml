# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/master/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  auto_save.session:
    global: true
  colors.webpage.darkmode.enabled:
    global: true
  colors.webpage.darkmode.policy.images:
    global: never
  colors.webpage.darkmode.threshold.text:
    global: 128
  colors.webpage.preferred_color_scheme:
    global: dark
  content.autoplay:
    global: false
  content.blocking.method:
    global: both
  content.cookies.accept:
    global: no-3rdparty
  content.media.audio_capture:
    https://meet.google.com: true
  content.media.audio_video_capture:
    https://meet.google.com: true
  content.media.video_capture:
    https://meet.google.com: true
  content.notifications.enabled:
    https://ibb.co: false
    https://meet.google.com: false
    https://www.facebook.com: false
    https://www.reddit.com: false
    https://www.youtube.com: false
  content.pdfjs:
    global: true
  content.register_protocol_handler:
    https://mail.google.com?extsrc=mailto&url=%25s: false
  downloads.location.directory:
    global: ~/Downloads/
  downloads.location.prompt:
    global: false
  downloads.remove_finished:
    global: 5000
  editor.command:
    global:
    - vim
    - '{file}'
    - -c
    - '{line}'
  fileselect.folder.command:
    global:
    - alacritty
    - -t
    - Ranger
    - --class
    - ranger
    - -e
    - ranger
    - --choosedir={}
  fileselect.handler:
    global: external
  fileselect.multiple_files.command:
    global:
    - alacritty
    - -t
    - Ranger
    - --class
    - ranger
    - -e
    - ranger
    - --choosefiles={}
  fileselect.single_file.command:
    global:
    - alacritty
    - -t
    - Ranger
    - --class
    - ranger
    - -e
    - ranger
    - --choosefiles={}
  fonts.default_family:
    global: FantasqueSansMono Nerd Font Mono
  fonts.prompts:
    global: default_size default_family
  hints.chars:
    global: asdfghjklweruiocvbn
  input.insert_mode.leave_on_load:
    global: false
  statusbar.show:
    global: in-mode
  tabs.last_close:
    global: default-page
  tabs.select_on_remove:
    global: prev
  tabs.show:
    global: multiple
  tabs.show_switching_delay:
    global: 2000
  window.hide_decoration:
    global: false
  window.transparent:
    global: true
  zoom.default:
    global: 140%
